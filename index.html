       <td><button  onclick="adicionar('6')" class="botoes">6</button></td>
    
    </tr>
    <tr>
     <td><button  onclick="adicionar('7')" class="botoes">7</button></td>

       <td><button  onclick="adicionar('9')" class="botoes">9</button></td>
    </tr>
    <tr>
    <td><button  onclick="adicionar('0')" class="botoes">0</button></td>
   <td><button onclick="adicionar('.')" class="botoes">.</button></td>

</tr>
<tr>
   
</tr>

    </div>
